    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brandGreen: '#047857',
                        brandOrange: '#f97316',
                        brandDark: '#111827',
                        brandLight: '#f3f4f6'
                    }
                }
            }
        }
    </script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');
        
        :root {
            --sat: env(safe-area-inset-top);
            --sar: env(safe-area-inset-right);
            --sab: env(safe-area-inset-bottom);
            --sal: env(safe-area-inset-left);
        }

        body { 
            font-family: 'Inter', sans-serif; 
            -webkit-tap-highlight-color: transparent;
            background-color: #f3f4f6;
            min-height: 100vh;
            min-height: 100dvh;
            overflow-x: hidden;
        }

        /* Plano de fundo com a foto da loja */
        .fixed-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background-image: linear-gradient(rgba(243, 244, 246, 0.85), rgba(243, 244, 246, 0.9)), 
                              url('WhatsApp%20Image%202026-03-23%20at%2021.39.50.jpeg');
            background-position: center;
            background-size: cover;
            background-repeat: no-repeat;
            pointer-events: none;
            transform: translateZ(0);
        }

        /* Correção de Zoom no iOS */
        input, textarea, select {
            font-size: 16px !important;
            appearance: none;
            -webkit-appearance: none;
            border-radius: 1rem;
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        .btn-active:active {
            transform: scale(0.95);
            opacity: 0.9;
        }

        .category-pill {
            cursor: pointer;
            transition: all 0.2s ease;
            user-select: none;
        }

        .category-pill.active { 
            background-color: #f97316; 
            color: white; 
            border-color: #f97316;
            box-shadow: 0 4px 12px rgba(249, 115, 22, 0.3);
        }

        .animate-slide-up { 
            animation: slideUp 0.3s cubic-bezier(0.16, 1, 0.3, 1); 
        }
        @keyframes slideUp { 
            from { transform: translateY(100%); } 
            to { transform: translateY(0); } 
        }
        
        .hero-section {
            background-color: #047857;
            padding-top: calc(1rem + var(--sat));
            position: relative;
            overflow: hidden;
        }

        .hero-pattern {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0.15;
            background-image: url("data:image/svg+xml,%3Csvg width='20' height='20' viewBox='0 0 20 20' xmlns='http://www.w3.org/2000/svg'%3E%3Ccircle cx='3' cy='3' r='3' fill='%23fff'/%3E%3C/svg%3E");
        }

        .product-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.8);
        }

        #modal-inner {
            padding-bottom: calc(2rem + var(--sab));
        }
    </style>
</head>
<body class="antialiased pb-24">

    <div class="fixed-bg"></div>

    <header class="sticky top-0 z-40 shadow-xl">
        <div class="hero-section text-white px-4 pb-6">

            <div class="container mx-auto relative z-10">
                <div class="flex justify-between items-center mb-6">
                    <div class="flex items-center gap-4">
                        <div class="bg-white p-2 rounded-2xl shadow-lg transform -rotate-6 border-2 border-brandOrange">
                            <i class="fa-solid fa-shop text-brandOrange text-2xl"></i>
                        </div>
                        <div>
                            <h1 class="text-3xl font-black tracking-tighter leading-none">KITOKO <span class="text-brandOrange">STORE</span></h1>
                            <p class="text-[10px] uppercase tracking-[0.2em] opacity-90 font-bold mt-1">Sabor que Transforma</p>
                        </div>
                    </div>
                    <button onclick="toggleCart()" class="btn-active relative p-3 bg-white/10 backdrop-blur-md rounded-2xl border border-white/20 transition-all">
                        <i class="fa-solid fa-cart-shopping text-xl"></i>
                        <span id="cart-count" class="absolute -top-1 -right-1 bg-brandOrange text-white text-[10px] font-black rounded-full w-5 h-5 flex items-center justify-center border-2 border-brandGreen">0</span>
                    </button>
                </div>

                    <i class="fa-solid fa-magnifying-glass absolute left-4 top-1/2 -translate-y-1/2 text-white/60 pointer-events-none"></i>
                    <input type="text" id="search-input" oninput="filtrarProdutos()" placeholder="O que deseja pedir hoje?" 
                        class="w-full bg-black/20 backdrop-blur-md border border-white/10 text-white placeholder-white/50 rounded-2xl py-4 pl-12 pr-4 focus:outline-none focus:ring-2 focus:ring-brandOrange/50 transition-all appearance-none">
                </div>
            </div>
        </div>

        <nav class="bg-white/95 backdrop-blur-md border-b border-gray-200 px-4 py-4 overflow-x-auto no-scrollbar flex gap-3" id="category-nav"></nav>
    </header>

    <main class="container mx-auto px-4 mt-8 space-y-12" id="product-list"></main>

    <!-- Modal de Produto -->
    <div id="product-modal" class="fixed inset-0 bg-black/80 z-50 hidden flex items-end sm:items-center justify-center p-0 sm:p-4 transition-opacity duration-300">

                <i class="fa-solid fa-xmark"></i>
            </button>
            <div id="modal-content"></div>
        </div>
    </div>

    <!-- Carrinho Lateral -->
    <div id="cart-sidebar" class="fixed inset-y-0 right-0 w-full md:w-[450px] bg-white shadow-2xl transform translate-x-full transition-transform duration-500 z-50 flex flex-col">
        <div class="bg-brandGreen text-white p-8 flex justify-between items-center" style="padding-top: calc(2rem + var(--sat))">
            <div>

            </div>
            <button onclick="toggleCart()" class="text-2xl opacity-80 active:scale-90 transition-all"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <div class="flex-1 overflow-y-auto p-6 space-y-4" id="cart-items"></div>
        <div class="border-t p-8 bg-gray-50 space-y-6" style="padding-bottom: calc(2rem + var(--sab))">

            <button onclick="openCheckoutForm()" class="btn-active w-full bg-brandGreen text-white font-black py-5 rounded-2xl shadow-xl transition-all text-lg tracking-tight">FINALIZAR PEDIDO</button>
        </div>
    </div>

    <!-- Modal de Checkout -->
    <div id="checkout-modal" class="fixed inset-0 bg-black/80 z-[60] hidden flex items-center justify-center p-4">
        <div class="bg-white rounded-[2rem] w-full max-w-md p-8 relative shadow-2xl max-h-[90vh] overflow-y-auto">
            <button onclick="closeCheckoutForm()" class="absolute top-6 right-6 text-gray-300 hover:text-gray-500 text-xl"><i class="fa-solid fa-xmark"></i></button>
            <h2 class="text-2xl font-black mb-2 text-brandDark">Dados de Entrega</h2>
            <p class="text-sm text-gray-500 mb-8">Informações necessárias para o envio.</p>
            <form id="checkout-form" class="space-y-4">

                        <option value="Pix">Pix</option>
                        <option value="Cartão">Cartão</option>
                        <option value="Dinheiro">Dinheiro</option>
                    </select>

                            </button>
                        </div>
                    </div>

                </div>

                    <i class="fa-brands fa-whatsapp text-2xl"></i> ENVIAR PELO WHATSAPP
                </button>
            </form>
        </div>
    </div>

        function renderCategorias() {
            const nav = document.getElementById('category-nav');
            nav.innerHTML = categorias.map((cat, idx) => `
                <div class="category-pill btn-active ${idx === 0 ? 'active' : ''} flex items-center gap-3 px-6 py-4 rounded-2xl border border-gray-100 bg-white text-gray-700 font-bold text-sm whitespace-nowrap shadow-sm" 
                     onclick="setActiveCat(this, '${cat.id}')">
                    <i class="fa-solid ${cat.icon} text-lg"></i> ${cat.label}
                </div>
            `).join('');
        }

        function setActiveCat(el, catId) {
            document.querySelectorAll('.category-pill').forEach(p => p.classList.remove('active'));
            el.classList.add('active');
            const target = document.getElementById(`cat-${catId}`);
            if (target) {
                const headerOffset = 180;
                const offsetPosition = target.getBoundingClientRect().top + window.pageYOffset - headerOffset;
                window.scrollTo({ top: offsetPosition, behavior: "smooth" });
            }
        }

        function renderProdutos(busca = "") {
            const container = document.getElementById('product-list');
            let html = '';
            categorias.forEach(cat => {
                const itens = cardapio.filter(p => p.cat === cat.id && p.nome.toLowerCase().includes(busca.toLowerCase()));
                if (itens.length === 0) return;
                html += `<section id="cat-${cat.id}" class="scroll-mt-48">
                    <div class="flex items-center gap-4 mb-6">
                        <div class="h-10 w-10 bg-brandGreen text-white rounded-xl flex items-center justify-center shadow-lg transform rotate-3">
                            <i class="fa-solid ${cat.icon} text-lg"></i>
                        </div>
                        <h2 class="text-2xl font-black text-brandDark uppercase tracking-tighter">${cat.label}</h2>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                        ${itens.map(p => `
                            <div class="product-card btn-active p-5 rounded-[2rem] shadow-sm flex flex-col justify-between transition-all relative" onclick="abrirModal(${p.id})">
                                <div class="relative z-10">
                                    <h3 class="font-extrabold text-lg text-brandDark leading-tight mb-2">${p.nome}</h3>
                                    <p class="text-gray-400 text-xs leading-relaxed mb-4 line-clamp-2">${p.desc}</p>
                                </div>
                                <div class="flex justify-between items-center mt-auto pt-4 border-t border-gray-100">
                                    <span class="font-black text-brandGreen text-xl">${p.tamanhos ? formatBRL(Object.values(p.tamanhos)[0]) : formatBRL(p.preco)}</span>
                                    <div class="bg-brandOrange text-white w-10 h-10 rounded-2xl flex items-center justify-center shadow-md">
                                        <i class="fa-solid fa-plus text-sm"></i>
                                    </div>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </section>`;
            });
            container.innerHTML = html || '<div class="text-center py-24 text-gray-300 font-bold uppercase">Sem resultados</div>';
        }

        function abrirModal(id) {
            const p = cardapio.find(x => x.id === id);
            produtoAtual = { ...p, qtd: 1, total: p.preco, extras: [], tamanho: null, opcao: null, obs: "" };
            const content = document.getElementById('modal-content');
            let extraHTML = '';
            
            if (p.tamanhos) {
                extraHTML += `<div class="mb-6 px-1"><p class="font-bold text-xs text-gray-400 uppercase tracking-widest mb-3">Selecione o Tamanho:</p><div class="space-y-2">
                        ${Object.entries(p.tamanhos).map(([size, price], i) => `<label class="flex justify-between p-4 border-2 border-gray-100 rounded-2xl cursor-pointer transition-all has-[:checked]:border-brandOrange has-[:checked]:bg-orange-50"><span class="flex items-center gap-3 font-bold text-gray-700"><input type="radio" name="size" value="${size}" ${i === 0 ? 'checked' : ''} onchange="atualizarPrecoModal()" class="w-6 h-6 accent-brandOrange"> ${size}</span><span class="font-black text-brandGreen">${formatBRL(price)}</span></label>`).join('')}</div></div>`;
            }
            if (p.opcoes) {
                extraHTML += `<div class="mb-6 px-1"><p class="font-bold text-xs text-gray-400 uppercase tracking-widest mb-3">Escolha a Opção:</p><div class="grid grid-cols-1 gap-2">
                        ${p.opcoes.map((o, i) => `<label class="flex items-center p-4 border-2 border-gray-100 rounded-2xl cursor-pointer has-[:checked]:border-brandOrange has-[:checked]:bg-orange-50 transition-all"><input type="radio" name="recheio" value="${o}" ${i === 0 ? 'checked' : ''} onchange="atualizarPrecoModal()" class="w-6 h-6 accent-brandOrange mr-4"><span class="font-bold text-gray-700">${o}</span></label>`).join('')}</div></div>`;
            }
            if (p.temAdicionais) {
                extraHTML += `<div class="mb-6 px-1"><p class="font-bold text-xs text-gray-400 uppercase tracking-widest mb-3">Extras (+ R$):</p><div class="grid grid-cols-1 gap-2">
                        ${adicionaisDisponiveis.map((ex, i) => `<label class="flex justify-between p-4 border-2 border-gray-100 rounded-2xl cursor-pointer hover:bg-gray-50 transition-all has-[:checked]:border-brandGreen has-[:checked]:bg-green-50"><span class="flex items-center gap-3 font-bold text-gray-700"><input type="checkbox" class="modal-extra w-6 h-6 accent-brandGreen" value="${i}" onchange="atualizarPrecoModal()"> ${ex.nome}</span><span class="text-brandGreen font-black">+ ${formatBRL(ex.preco)}</span></label>`).join('')}</div></div>`;
            }

            content.innerHTML = `
                <div class="p-6 pb-10" id="modal-inner">
                    <div class="mb-6">
                        <h2 class="text-3xl font-black text-brandDark mb-2 tracking-tighter">${p.nome}</h2>
                        <p class="text-gray-400 leading-relaxed text-sm font-medium">${p.desc}</p>
                    </div>
                    ${extraHTML}
                    
                    <div class="mb-6">
                        <p class="font-bold text-xs text-gray-400 uppercase tracking-widest mb-3">Observação Especial:</p>
                        <textarea id="modal-obs" placeholder="Ex: Sem cebola, bem gelada, sabor morango..." class="w-full border-2 border-gray-100 rounded-2xl px-4 py-3 outline-none focus:border-brandOrange h-24 resize-none bg-gray-50 appearance-none"></textarea>
                    </div>

                    <div class="flex items-center justify-between mt-6 border-t border-gray-100 pt-6">
                        <div class="flex items-center bg-gray-100 rounded-2xl p-1">
                            <button onclick="changeModalQtd(-1)" class="w-10 h-10 text-xl font-bold text-gray-600">-</button>
                            <span id="modal-qtd" class="w-8 text-center font-black text-xl text-brandDark">1</span>
                            <button onclick="changeModalQtd(1)" class="w-10 h-10 text-xl font-bold text-gray-600">+</button>
                        </div>
                        <button onclick="adicionarAoCarrinho()" class="btn-active flex-1 ml-4 bg-brandOrange text-white font-black py-6 rounded-3xl shadow-xl transition-all">ADICIONAR <span id="modal-total" class="ml-1 opacity-80">${formatBRL(p.preco)}</span></button>
                    </div>
                </div>`;
            document.getElementById('product-modal').classList.remove('hidden');
            document.body.style.overflow = 'hidden';
            atualizarPrecoModal();
        }

        function atualizarPrecoModal() {
            let base = produtoAtual.preco;
            const sizeRadio = document.querySelector('input[name="size"]:checked');
            if (sizeRadio) { base = produtoAtual.tamanhos[sizeRadio.value]; produtoAtual.tamanho = sizeRadio.value; }
            const optRadio = document.querySelector('input[name="recheio"]:checked');
            if (optRadio) { produtoAtual.opcao = optRadio.value; }
            let extraTotal = 0;
            const checks = document.querySelectorAll('.modal-extra:checked');
            const selecionados = [];
            checks.forEach(c => { const ex = adicionaisDisponiveis[c.value]; extraTotal += ex.preco; selecionados.push(ex); });
            produtoAtual.extras = selecionados;
            produtoAtual.total = (base + extraTotal) * produtoAtual.qtd;
            document.getElementById('modal-total').innerText = formatBRL(produtoAtual.total);
        }

        function changeModalQtd(v) { 
            produtoAtual.qtd = Math.max(1, produtoAtual.qtd + v); 
            document.getElementById('modal-qtd').innerText = produtoAtual.qtd; 
            atualizarPrecoModal(); 
        }

        function adicionarAoCarrinho() { 
            produtoAtual.obs = document.getElementById('modal-obs').value.trim();
            carrinho.push({ ...produtoAtual }); 
            atualizarCarrinhoUI(); 
            closeProductModal(); 
            mostrarToast(`${produtoAtual.nome} adicionado!`); 
        }

        function atualizarCarrinhoUI() {
            const count = carrinho.reduce((acc, i) => acc + i.qtd, 0);
            document.getElementById('cart-count').innerText = count;
            const container = document.getElementById('cart-items');
            if (carrinho.length === 0) {
                container.innerHTML = `<div class="flex flex-col items-center justify-center py-20 text-center"><div class="w-20 h-20 bg-gray-100 rounded-full flex items-center justify-center mb-4"><i class="fa-solid fa-basket-shopping text-2xl text-gray-300"></i></div><p class="font-black text-gray-300 text-sm uppercase">Carrinho Vazio</p></div>`;
                document.getElementById('cart-total').innerText = formatBRL(0);
                return;
            }
            let total = 0;
            container.innerHTML = carrinho.map((item, idx) => {
                total += item.total;
                return `<div class="flex justify-between items-start gap-4 bg-white border border-gray-100 p-5 rounded-3xl"><div class="flex-1"><h4 class="font-extrabold text-brandDark tracking-tight">${item.qtd}x ${item.nome} ${item.tamanho ? '<span class="text-[10px] text-gray-400">('+item.tamanho+')</span>' : ''}</h4>${item.opcao ? `<p class="text-[9px] text-gray-400 font-black uppercase mt-1">Opção: ${item.opcao}</p>` : ''}${item.extras.length > 0 ? `<p class="text-[9px] text-brandGreen font-black mt-1">Extras: ${item.extras.map(e => e.nome).join(', ')}</p>` : ''}${item.obs ? `<p class="text-[9px] text-brandOrange italic mt-1 font-bold">Obs: ${item.obs}</p>` : ''}<p class="text-base font-black text-brandOrange mt-2">${formatBRL(item.total)}</p></div><button onclick="removerItem(${idx})" class="btn-active text-gray-300 hover:text-red-500 p-2 bg-gray-50 rounded-xl"><i class="fa-solid fa-trash-can text-sm"></i></button></div>`;
            }).join('');
            document.getElementById('cart-total').innerText = formatBRL(total);
        }

        function removerItem(idx) { carrinho.splice(idx, 1); atualizarCarrinhoUI(); }

        function handlePaymentChange() {
            const pag = document.getElementById('cx-pagamento').value;
            const trocoInput = document.getElementById('cx-troco');
            const pixContainer = document.getElementById('pix-container');
            trocoInput.classList.toggle('hidden', pag !== 'Dinheiro');
            pixContainer.classList.toggle('hidden', pag !== 'Pix');
        }

        function copyPixKey() {
            const keyText = "61165843000132"; // CNPJ apenas em números para evitar erros no banco
            const tempInput = document.createElement("input");
            tempInput.value = keyText;
            document.body.appendChild(tempInput);
            tempInput.select();
            document.execCommand("copy");
            document.body.removeChild(tempInput);
            mostrarToast("Chave Pix copiada!");
        }

        function finalizeOrder() {
            const nome = document.getElementById('cx-nome').value.trim();
            const end = document.getElementById('cx-endereco').value.trim();
            const pag = document.getElementById('cx-pagamento').value;
            const troco = document.getElementById('cx-troco').value;
            if (!nome || !end) return alert("Por favor, preencha o seu Nome e Endereço.");
            
            const now = new Date();
            const dataFormatada = now.toLocaleDateString('pt-BR');
            
            let msg = `🛒 *NOVO PEDIDO - ${NOME_LOJA}*\n`;
            msg += `Data: *${dataFormatada}*\n\n`;
            msg += `👤 *Cliente:* ${nome}\n`;
            msg += `📍 *Endereço:* ${end}\n`;
            msg += `------------------------------\n`;

            let total = 0;
            carrinho.forEach(item => {
                total += item.total;
                msg += `✅ ${item.qtd}x ${item.nome}${item.tamanho ? ' ('+item.tamanho+')' : ''}${item.opcao ? ' - '+item.opcao : ''}\n`;
                if(item.obs) msg += `   _Obs: ${item.obs}_\n`;
                msg += `   Subtotal: ${formatBRL(item.total)}\n\n`;
            });
            
            msg += `------------------------------\n`;
            msg += `💰 *TOTAL: ${formatBRL(total)}*\n`;
            msg += `💳 *Pagamento:* ${pag}${troco ? ' (Troco para ' + troco + ')' : ''}`;
            
            window.open(`https://wa.me/${NUMERO_WHATSAPP}?text=${encodeURIComponent(msg)}`, '_blank');
        }

        function toggleCart() { document.getElementById('cart-sidebar').classList.toggle('translate-x-full'); }
        function closeProductModal() { document.getElementById('product-modal').classList.add('hidden'); document.body.style.overflow = 'auto'; }
        function openCheckoutForm() { if (carrinho.length === 0) return alert("O seu carrinho está vazio!"); document.getElementById('checkout-modal').classList.remove('hidden'); handlePaymentChange(); }
        function closeCheckoutForm() { document.getElementById('checkout-modal').classList.add('hidden'); }
        function filtrarProdutos() { renderProdutos(document.getElementById('search-input').value); }
        
        function mostrarToast(txt) {
            const t = document.createElement('div');
            t.className = 'fixed bottom-24 left-1/2 -translate-x-1/2 bg-brandDark text-white px-8 py-5 rounded-[2rem] shadow-2xl z-[100] font-black text-xs animate-slide-up flex items-center gap-4 border border-white/10';
            t.innerHTML = `<i class="fa-solid fa-circle-check text-brandOrange text-base"></i> ${txt}`;
            document.body.appendChild(t);
            setTimeout(() => t.remove(), 2500);
        }

        function setupScroll() {
            window.addEventListener('scroll', () => {
                const sections = document.querySelectorAll('section');
                let cur = '';
                sections.forEach(s => { if (window.pageYOffset >= s.offsetTop - 220) cur = s.getAttribute('id'); });
                document.querySelectorAll('.category-pill').forEach(p => { 
                    const onclickStr = p.getAttribute('onclick');
                    p.classList.toggle('active', onclickStr.includes(cur)); 
                });
            });
        }
        window.onload = init;
    </script>
</body>
</html>
